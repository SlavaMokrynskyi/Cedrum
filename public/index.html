<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="./manifest.json" />
    <title>Cedrum Wallet</title>
    <script>
      (function () {
        var hash = window.location.hash || "";
        var searchParams = new URLSearchParams(window.location.search || "");
        var isPopupRoute =
          hash.startsWith("#/popup/confirm-connect") ||
          hash.startsWith("#/popup/sign-message") ||
          hash.startsWith("#/popup/sign-transaction");
        var isUnlockPopup =
          hash.startsWith("#/wallet/unlock") &&
          searchParams.get("unlock") === "true";
        var isFullscreenExtensionView =
          searchParams.get("fullScreen") === "true";
        var isExpandedExtensionView =
          searchParams.get("window") === "true" ||
          isFullscreenExtensionView;

        if (isPopupRoute || isUnlockPopup || isExpandedExtensionView) {
          document.documentElement.setAttribute("data-window-flow", "true");
        }

        if (isFullscreenExtensionView) {
          document.documentElement.setAttribute("data-fullscreen-flow", "true");
        }
      })();
    </script>
    <style>
      :root {
        --extension-popup-width: 360px;
        --extension-popup-height: 640px;
        --extension-shell-width: 420px;
        --extension-shell-height: 760px;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: var(--extension-popup-width);
        height: var(--extension-popup-height);
        min-width: var(--extension-popup-width);
        min-height: var(--extension-popup-height);
        max-width: 100vw;
        max-height: 100vh;
        overflow: hidden;
        background-color: #0e0f14;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      html[data-window-flow="true"],
      html[data-window-flow="true"] body,
      html[data-window-flow="true"] #root {
        width: 100% !important;
        height: 100% !important;
        min-width: 0 !important;
        min-height: 0 !important;
        max-width: none !important;
        max-height: none !important;
      }

      body {
        position: relative;
      }

      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        min-width: var(--extension-popup-width);
        min-height: var(--extension-popup-height);
        overflow: hidden;
        background-color: #0e0f14;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      #root::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="../src/index.tsx"></script>
  </body>
</html>
